<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <header>
      <nav></nav>
    </header>
    <style>
      .name {
        margin-top: 200px;
        animation: anim 3s ease-in infinite;
      }
      @keyframes anim {
        0% {
          opacity: 0;
          color: green;
          transform: translateY(0);

          20% {
            opacity: 0.2;
            color: orange;
            transform: translateY(0);
          }
        }
        50% {
          opacity: 0.5;
          color: red;
          transform: translateY(-50px);
        }
        100% {
          opacity: 1;
          color: yellow;
          transform: translateY(0);
        }
      }
    </style>
  </head>
  <body>
    <h1 class="name">I love Cameroom</h1>
  </body>
</html>
