<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      .relative {
        height: 2000px;
        width: 100vw;
        background-color: blue;
        position: relative;
        margin-top: 100px;
      }
      img {
        width: 50px;
        height: 50px;
        border-radius: 50%;
      }
      body {
        height: 10000vh;
        /* display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center; */
      }
      .image11 {
        position: absolute;
        bottom: 0;
      }
      .image2 {
        position: absolute;
        bottom: 0;
        right: 0;
      }
      .image3 {
        position: absolute;
        top: 0;
        right: 0;
      }
      .image4 {
        position: absolute;
        top: 0;
        left: 0;
      }
      .image5 {
        position: absolute;
        top: 40%;
        left: 40%;
      }
      .image6 {
        position: absolute;
        left: 40%;
        top: -20px;
      }
      nav {
        display: flex;
        justify-content: space-around;
        align-items: center;
        color: white;
        background-color: rgb(3, 3, 25);
        margin: 30px;
        position: fixed;
        top: 0;
        right: 0;
        left: 0;
        z-index: 5;
      }
      h1 {
        margin-top: 100px;
        text-align: center;
        color: white;
        position: sticky;
        top: 0;
        z-index: 5;
      }
    </style>
  </head>
  <body>
    <header>
      <nav>
        <p>Home</p>
        <p>About</p>
        <p>Services</p>
        <p>Contact</p>
      </nav>
    </header>
    <div class="relative">
      <h1>CSS POSITIONNG</h1>
      <img src="image2.png" class="image11" />
      <img src="image36.png" class="image2" />
      <img src="image4.png" class="image3" />
      <img src="image3.png" class="image4" />
      <img src="image45.png" class="image5" />
      <img src="image5.png" class="image6" />
    </div>
  </body>
</html>
